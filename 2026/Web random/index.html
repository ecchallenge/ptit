

<!DOCTYPE html>
<html lang="vi">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EC Challenge 2026 - Random Nhiệm Vụ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-overlay"></div>

    <header class="top-header">
        <div class="logo-img">
            <img src="logo.png" alt="EC Logo">
        </div>
        <h1>Random 2 Nhiệm Vụ</h1>
        <!-- <p class="subtitle">Giao diện mô phỏng theo màu chủ đề EC Challenge 2026</p> -->
    </header>

    <main class="container">
        <!-- Nhiệm vụ 1 -->
        <section class="section-card">
            <div class="section-glow"></div>
            <h2>Nhiệm vụ 1: Đầu ra 3 cổng logic</h2>

            <div class="gate-list">
                <div class="gate-item">
                    <span class="gate-name">AND</span>
                    <span class="gate-output" id="andOutput">0</span>
                </div>

                <div class="gate-item">
                    <span class="gate-name">OR</span>
                    <span class="gate-output" id="orOutput">0</span>
                </div>

                <div class="gate-item">
                    <span class="gate-name">XOR</span>
                    <span class="gate-output" id="xorOutput">0</span>
                </div>
            </div>

            <button class="action-btn" onclick="randomLogicOutputs()">Random đầu ra</button>
            <p class="note">Mỗi cổng sẽ random ra 0 hoặc 1 độc lập.</p>
        </section>

        <!-- Nhiệm vụ 2 -->
        <section class="section-card">
            <div class="section-glow"></div>
            <h2>Nhiệm vụ 2: Vị trí lõi công nghệ</h2>

            <div class="single-grid">
                <div class="cell white" id="whiteCell"></div>
                <div class="cell black" id="blackCell"></div>
            </div>

            <button class="action-btn" onclick="randomBlackWhite()">Random ô màu</button>
            <p class="note">Hệ thống sẽ ẩn ngẫu nhiên 1 trong 2 ô.</p>
        </section>
    </main>

    <script>
        function randomBit() {
            return Math.random() < 0.5 ? 0 : 1;
        }

        function randomLogicOutputs() {
            document.getElementById("andOutput").textContent = randomBit();
            document.getElementById("orOutput").textContent = randomBit();
            document.getElementById("xorOutput").textContent = randomBit();
        }

        function randomBlackWhite() {
            const white = document.getElementById("whiteCell");
            const black = document.getElementById("blackCell");

            white.classList.remove("hidden");
            black.classList.remove("hidden");

            if (Math.random() < 0.5) {
                white.classList.add("hidden");
            } else {
                black.classList.add("hidden");
            }
        }
    </script>
</body>
</html>
